<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>KisanKart | Products</title>

<link rel="stylesheet"
href="./products.css">

</head>


<body>


<header class="navbar">

    <h2>KisanKart</h2>


    <div class="search-box">

        <input

        type="text"

        id="searchInput"

        placeholder="Search fresh products">


        <button id="searchBtn">

            Search

        </button>


    </div>


    <div class="actions">

        <a href="./cart.html">

            Cart

        </a>


        <a href="./wishlist.html">

            Wishlist

        </a>


    </div>


</header>





<section class="filters">


<select id="categoryFilter">

<option value="">

All Categories

</option>

</select>




<select id="sortFilter">


<option value="">

Sort By

</option>


<option value="low">

Price Low To High

</option>


<option value="high">

Price High To Low

</option>


</select>



</section>





<section>


<h1>

Fresh Products

</h1>


<div

id="productContainer"

class="products">


</div>



</section>





<div

id="pagination"

class="pagination">


</div>





<script src="./products.js"></script>


</body>

</html>
