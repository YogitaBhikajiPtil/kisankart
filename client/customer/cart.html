<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Cart | KisanKart</title>

    <link rel="stylesheet"
          href="./cart.css">

</head>

<body>

<nav class="navbar">

    <h2>KisanKart</h2>

    <a href="./products.html">

        Continue Shopping

    </a>

</nav>

<div class="container">

    <div class="cart-section">

        <h1>Shopping Cart</h1>

        <div id="cartItems"></div>

    </div>

    <div class="summary">

        <h2>Order Summary</h2>

        <p>

            Total Items :
            <span id="totalItems">0</span>

        </p>

        <p>

            Total Amount :
            ₹<span id="totalAmount">0</span>

        </p>

        <button id="checkoutBtn">

            Proceed To Checkout

        </button>

        <button id="clearCartBtn">

            Clear Cart

        </button>

    </div>

</div>

<script src="./cart.js"></script>

</body>

</html>
