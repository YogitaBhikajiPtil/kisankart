<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanKart | Login</title>

    <link rel="stylesheet" href="./assets/css/login.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- Left Section -->

        <div class="left-section">

            <div class="overlay">

                <h1>Welcome Back!</h1>

                <p>

                    Login to continue buying fresh products directly
                    from farmers or manage your farm business.

                </p>

                <a href="register.html">
                    Create New Account
                </a>

            </div>

        </div>

        <!-- Right Section -->

        <div class="right-section">

            <form id="loginForm">

                <h2>Login</h2>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                    <i
                        class="fa-solid fa-eye"
                        id="togglePassword">
                    </i>

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox" id="rememberMe">

                        Remember Me

                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <button type="submit">

                    Login

                </button>

                <p class="bottom-text">

                    Don't have an account?

                    <a href="register.html">

                        Register

                    </a>

                </p>

            </form>

        </div>

    </div>

    <script src="./assets/js/login.js"></script>

</body>

</html>
