<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="./dashboard.css">

</head>

<body>

<nav class="navbar">

    <h2>KisanKart Admin</h2>

    <button id="logoutBtn">
        Logout
    </button>

</nav>

<div class="container">

    <h1>Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h3>Customers</h3>
            <h2 id="customers">0</h2>
        </div>

        <div class="card">
            <h3>Farmers</h3>
            <h2 id="farmers">0</h2>
        </div>

        <div class="card">
            <h3>Delivery</h3>
            <h2 id="delivery">0</h2>
        </div>

        <div class="card">
            <h3>Products</h3>
            <h2 id="products">0</h2>
        </div>

        <div class="card">
            <h3>Orders</h3>
            <h2 id="orders">0</h2>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <h2 id="revenue">₹0</h2>
        </div>

    </div>

</div>

<script src="./dashboard.js"></script>

</body>
</html>
