<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Farmer Profile | KisanKart</title>

    <link rel="stylesheet"
          href="./profile.css">

</head>


<body>


<div class="profile-container">


    <h1>

        Farmer Profile

    </h1>


    <div class="profile-card">


        <div class="image-section">


            <img

                id="profileImage"

                src="../assets/user.png"

                alt="Profile">


        </div>



        <div class="form-section">


            <label>

                Name

            </label>


            <input

                type="text"

                id="name"

                placeholder="Enter name">



            <label>

                Email

            </label>


            <input

                type="email"

                id="email"

                disabled>



            <label>

                Phone

            </label>


            <input

                type="text"

                id="phone"

                placeholder="Enter phone">



            <label>

                Profile Image URL

            </label>


            <input

                type="text"

                id="image"

                placeholder="Image URL">



            <button

                id="updateBtn">

                Update Profile

            </button>


        </div>


    </div>


</div>



<script src="./profile.js"></script>


</body>

</html>
